<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>First Impression</title>
<style>
  :root{
    --purple:#bf80ff; --purple-dim:rgba(191,128,255,.15); --purple-soft:rgba(191,128,255,.08);
    --ink:#e7e5ea; --muted:#8b8792; --card:rgba(255,255,255,.03); --line:rgba(191,128,255,.16);
    --ok:#5fd39a; --no:#ff6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#000;color:var(--ink);font:16px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow-x:hidden}
  #bg{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
  .fade{opacity:0;transform:translateY(20px);animation:up .8s ease forwards}
  .fade.d1{animation-delay:.1s}.fade.d2{animation-delay:.25s}.fade.d3{animation-delay:.4s}
  @keyframes up{to{opacity:1;transform:none}}

  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;
    background:var(--purple-soft);border:1px solid var(--purple-dim);backdrop-filter:blur(6px);
    font-size:13px;color:#d7cfe6}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px var(--purple)}
  h1{font-size:clamp(40px,8vw,84px);font-weight:800;letter-spacing:-.03em;margin:22px 0 14px;
    background:linear-gradient(180deg,#fff,#9a95a3);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{max-width:620px;text-align:center;color:var(--muted);font-size:18px;margin-bottom:34px}

  .bar{display:flex;gap:10px;width:100%;max-width:640px}
  .bar input{flex:1;padding:15px 18px;border-radius:12px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:var(--ink);font-size:15px;outline:none}
  .bar input:focus{border-color:var(--purple)}
  .bar button{padding:0 26px;border:0;border-radius:12px;background:#fff;color:#000;font-weight:700;
    font-size:15px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s}
  .bar button:hover{background:#e6e6e6}
  .bar button:disabled{opacity:.5;cursor:not-allowed}
  .opts{display:flex;gap:18px;margin-top:12px;color:var(--muted);font-size:13px;align-items:center}
  .opts label{display:flex;gap:6px;align-items:center;cursor:pointer}

  .stage{width:100%;max-width:900px;margin-top:40px;display:none}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;
    backdrop-filter:blur(8px);margin-bottom:20px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--purple);margin-bottom:14px;font-weight:600}

  #trace .row{display:flex;gap:10px;align-items:baseline;padding:5px 0;font-size:14px;
    border-bottom:1px solid rgba(255,255,255,.04);animation:up .4s ease}
  #trace .ic{width:20px;text-align:center}
  #trace .u{color:var(--muted);font-size:12.5px;word-break:break-all}
  .badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .badge{font-size:12px;padding:4px 11px;border-radius:999px;background:var(--purple-soft);
    border:1px solid var(--purple-dim);color:#d7cfe6}
  .badge.warn{background:rgba(255,180,80,.1);border-color:rgba(255,180,80,.3);color:#ffcf8f}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .obs{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
  .obs:last-child{border:0}
  .obs .ev{color:var(--muted);font-size:12.5px;margin-top:3px}
  .obs a{color:var(--purple);text-decoration:none;font-size:12px}

  .pcard{border:1px solid var(--line);border-radius:12px;padding:14px;background:rgba(255,255,255,.02)}
  .pcard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .pcard .name{font-weight:600;font-size:14px}
  .verdict{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .verdict.yes{background:rgba(95,211,154,.12);color:var(--ok);border:1px solid rgba(95,211,154,.3)}
  .verdict.no{background:rgba(255,107,107,.1);color:var(--no);border:1px solid rgba(255,107,107,.3)}
  .pcard .why{color:var(--muted);font-size:13px}
  .pcard ul{list-style:none;margin-top:8px;font-size:12.5px}
  .pcard li{padding:2px 0;color:#c9c4d1}
  .company{font-size:26px;font-weight:700;margin-bottom:4px}
  .scope{color:var(--muted);font-size:12.5px;margin-top:16px;font-style:italic}
  ul.plain{list-style:none} ul.plain li{padding:5px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.05)}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--purple-dim);
    border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{color:var(--no)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="pill fade"><span class="dot"></span> First Impression Engine</div>
  <h1 class="fade d1">First Impression</h1>
  <p class="sub fade d2">See any startup's public site through fresh eyes — what a new visitor takes away, where they hesitate, and how three personas react. Grounded, cited, live.</p>
  <div class="fade d3" style="width:100%;max-width:640px">
    <div class="bar">
      <input id="url" type="url" placeholder="https://example.com" value="https://www.vortexify.ai/" />
      <button id="run">Analyze <span>→</span></button>
    </div>
    <div class="opts">
      <label><input type="checkbox" id="panel" checked /> persona panel</label>
      <label>max pages <input type="number" id="max" value="15" min="1" max="50" style="width:56px;padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink)"/></label>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="panel" id="tracePanel">
      <h2 id="traceTitle">Working <span class="spin"></span></h2>
      <div id="trace"></div>
    </div>
    <div id="report"></div>
  </div>
</div>

<script>
// ---- particle constellation background (vanilla port) ----
(function(){
  const c=document.getElementById('bg'),x=c.getContext('2d');
  let ps=[],raf,mouse={x:null,y:null,r:160};
  function P(px,py,dx,dy,s){this.x=px;this.y=py;this.dx=dx;this.dy=dy;this.s=s}
  P.prototype.draw=function(){x.beginPath();x.arc(this.x,this.y,this.s,0,7);x.fillStyle='rgba(191,128,255,.8)';x.fill()};
  P.prototype.up=function(){
    if(this.x>c.width||this.x<0)this.dx=-this.dx; if(this.y>c.height||this.y<0)this.dy=-this.dy;
    if(mouse.x!=null){const a=mouse.x-this.x,b=mouse.y-this.y,d=Math.hypot(a,b);
      if(d<mouse.r+this.s){this.x-=a/d*((mouse.r-d)/mouse.r)*4;this.y-=b/d*((mouse.r-d)/mouse.r)*4}}
    this.x+=this.dx;this.y+=this.dy;this.draw()};
  function init(){ps=[];const n=(c.height*c.width)/12000;
    for(let i=0;i<n;i++){const s=Math.random()*2+1;
      ps.push(new P(Math.random()*c.width,Math.random()*c.height,(Math.random()*.4)-.2,(Math.random()*.4)-.2,s))}}
  function connect(){for(let a=0;a<ps.length;a++)for(let b=a;b<ps.length;b++){
    const d=(ps[a].x-ps[b].x)**2+(ps[a].y-ps[b].y)**2;
    if(d<(c.width/7)*(c.height/7)){const o=1-d/22000;
      x.strokeStyle='rgba(180,140,255,'+o+')';x.lineWidth=1;
      x.beginPath();x.moveTo(ps[a].x,ps[a].y);x.lineTo(ps[b].x,ps[b].y);x.stroke()}}}
  function loop(){raf=requestAnimationFrame(loop);x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);
    ps.forEach(p=>p.up());connect()}
  function size(){c.width=innerWidth;c.height=innerHeight;init()}
  addEventListener('resize',size);addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
  addEventListener('mouseout',()=>{mouse.x=mouse.y=null});
  size();loop();
})();

// ---- dashboard logic ----
const $=s=>document.querySelector(s);
const trace=$('#trace'), report=$('#report'), stage=$('#stage'), runBtn=$('#run');
const esc=s=>String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function line(ic,html){const d=document.createElement('div');d.className='row';
  d.innerHTML=`<span class="ic">${ic}</span><span>${html}</span>`;trace.appendChild(d);
  trace.scrollTop=trace.scrollHeight;}

let es=null;
runBtn.onclick=()=>{
  const url=$('#url').value.trim(); if(!url)return;
  if(es)es.close();
  trace.innerHTML=''; report.innerHTML=''; stage.style.display='block';
  $('#traceTitle').innerHTML='Working <span class="spin"></span>';
  runBtn.disabled=true;
  const q=new URLSearchParams({url,max_pages:$('#max').value,panel:$('#panel').checked});
  es=new EventSource('/analyze/stream?'+q);
  es.onmessage=e=>handle(JSON.parse(e.data));
  es.onerror=()=>{ if(runBtn.disabled){line('⚠️','<span class="err">connection lost</span>');finish();} };
};
function finish(){runBtn.disabled=false;$('#traceTitle').textContent='Trace';if(es)es.close();}

function handle(ev){
  switch(ev.type){
    case 'phase':
      const names={crawl:'🕷️ Crawling site…',embed:`🧬 Embedding ${ev.chunks||''} chunks…`,analyze:'🤖 Agent exploring…'};
      line('•',names[ev.name]||esc(ev.name)); break;
    case 'crawl.page': line('📄',`${esc(ev.url)} <span class="u">· ${ev.chars} chars</span>`); break;
    case 'render.escalate': line('🎭','JavaScript site detected — rendering with headless browser'); break;
    case 'ingest.done':{
      const b=[`${ev.pages_fetched} pages`,`${ev.chunks_stored} chunks`];
      let h=b.map(t=>`<span class="badge">${t}</span>`).join(' ');
      if(ev.injection_lines_removed)h+=`<span class="badge warn">${ev.injection_lines_removed} injection lines stripped</span>`;
      if(ev.extraction_warning)h+=`<span class="badge warn">JS-rendered · limited</span>`;
      line('✅',`Ingested<div class="badges">${h}</div>`); break; }
    case 'tool':{
      const a=ev.args&&Object.values(ev.args)[0]?' <span class="u">'+esc(Object.values(ev.args)[0])+'</span>':'';
      line('🔧',`<b>${esc(ev.name)}</b>${a}`); break; }
    case 'persona':
      line(ev.would_sign_up?'✅':'❌',`<b>${esc(ev.persona)}</b> <span class="u">${esc(ev.reason)}</span>`); break;
    case 'report.done': renderReport(ev.report); finish(); break;
    case 'error': line('⚠️',`<span class="err">${esc(ev.message)}</span>`); finish(); break;
  }
}

function obsList(items){return (items||[]).map(o=>
  `<div class="obs">${esc(o.claim)}<div class="ev">${esc(o.evidence)} · <a href="${esc(o.source_url)}" target="_blank">source</a></div></div>`).join('')||'<div class="obs u">—</div>';}

function renderReport(r){
  const panel=(r.persona_panel||[]).map(p=>`
    <div class="pcard"><div class="top"><span class="name">${esc(p.persona)}</span>
      <span class="verdict ${p.would_sign_up?'yes':'no'}">${p.would_sign_up?'would sign up':'would not'}</span></div>
      <div class="why">${esc(p.reason)}</div>
      <ul>${(p.friction||[]).slice(0,3).map(f=>`<li>• ${esc(f)}</li>`).join('')}</ul></div>`).join('');
  const sugg=(r.improvement_opportunities||[]).map(s=>
    `<div class="obs">💡 ${esc(s.suggestion)}<div class="ev">${esc(s.observed)} · <a href="${esc(s.source_url)}" target="_blank">source</a></div></div>`).join('')||'<div class="obs u">—</div>';
  const unans=(r.unanswered_questions||[]).map(q=>`<li>❓ ${esc(q)}</li>`).join('');
  report.innerHTML=`
    <div class="panel">
      <div class="company">${esc(r.company)}</div>
      ${panel?`<div class="grid" style="margin-top:16px">${panel}</div>`:''}
    </div>
    <div class="grid">
      <div class="panel"><h2>What it is</h2>${obsList(r.what_the_product_is)}</div>
      <div class="panel"><h2>Standout strengths</h2>${obsList(r.standout_strengths)}</div>
      <div class="panel"><h2>Friction points</h2>${obsList(r.friction_points)}</div>
      <div class="panel"><h2>Improvement ideas</h2>${sugg}</div>
    </div>
    <div class="panel"><h2>Unanswered questions</h2><ul class="plain">${unans||'<li class="u">—</li>'}</ul>
      <div class="scope">${esc(r.scope_note)}</div></div>`;
  report.scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
